syntax = "proto3";
package Fantasy.Network.Message;

// 协议分为:
// ProtoBuf:可以在Outer和Inner文件里使用。
// MemoryPack:可以在Outer和Inner文件里使用。

// 目前工具支持以下几种特殊用法:
// 在message协议上方添加// Protocol+空格+协议名字
// 例如: // Protocol ProtoBuf 或 // Protocol MemoryPack

// 分别代表使用Protobuf序列化或使用MemoryPack序列化
// 通过添加 // using 导出时添加自定义命名空间
// 例如: // using System.Runtime // using System.Reflection

/// 客户端登陆到Gate服务器
message C2G_LoginGameRequest // IRequest,G2C_LoginGameResponse
{
	string Account = 1;
	string Password = 2;
}
message G2C_LoginGameResponse // IResponse
{
	
}
/// 客户端通知服务器可以接收服务器推送的消息
message C2M_InitComplete // IRoamingMessage,MapRoamingType
{
	
}
/// Map服务器通知客户端创建新的Player
message M2C_PlayerCreate // IRoamingMessage,MapRoamingType
{
	PlayerInfo Player = 1;	// 玩家信息
	bool IsSelf = 2;	    // 是否是自己
}
/// 客户端上报移动输入，玩家身份由服务器当前连接确定
message C2M_PlayerMove // IRoamingMessage,MapRoamingType
{
	uint32 ClientTick = 1;	// 客户端递增的固定模拟Tick，用于确认和输入重放
	int32 MoveX = 2;		// 水平方向：-1、0、1
	int32 MoveY = 3;		// 垂直方向：-1、0、1
}
/// Map服务器广播玩家权威移动状态
message M2C_PlayerMove // IRoamingMessage,MapRoamingType
{
	int64 PlayerId = 1;
	Position Pos = 2;
	uint32 ServerTick = 3;				// 服务器权威模拟 Tick
	uint32 LastProcessedClientTick = 4;	// 仅本人使用：服务器已处理的最后输入 Tick
}
/// Map通知客户端有Player离开
message M2C_PlayerLeave // IRoamingMessage,MapRoamingType
{
	int64 PlayerId = 1;
}
/// Player信息
message PlayerInfo
{
	int64 PlayerId = 1;			// Player的Id
	string Name = 2;			// Player的名字
	Position Pos = 3;			// 位置信息
}
/// 坐标信息
message Position
{
	float X = 1;
	float Y = 2;
	float Z = 3;
}